<!DOCTYPE html>
<html>
<head>

<title>SMART HUB</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

<img src="SMARTHUB-logo.png">

<h2>SMART HUB</h2>

</div>

<input class="search" placeholder="Search products...">

<div class="buttons">

<button onclick="openLogin()">Login</button>

<button onclick="openCart()">Cart</button>

</div>

</header>

<section class="hero">

<h1>Welcome To SMART HUB</h1>

<p>Best Online Electronics Store</p>

</section>

<section class="products">

<div class="card">

<img src="https://picsum.photos/300/200">

<h3>Wireless Headphone</h3>

<p>$49</p>

<button onclick="buy()">Buy</button>

</div>

<div class="card">

<img src="https://picsum.photos/301/200">

<h3>Smart Watch</h3>

<p>$89</p>

<button onclick="buy()">Buy</button>

</div>

<div class="card">

<img src="https://picsum.photos/302/200">

<h3>Gaming Mouse</h3>

<p>$39</p>

<button onclick="buy()">Buy</button>

</div>

<div class="card">

<img src="https://picsum.photos/303/200">

<h3>Bluetooth Speaker</h3>

<p>$59</p>

<button onclick="buy()">Buy</button>

</div>

<div class="card">

<img src="https://picsum.photos/304/200">

<h3>Mechanical Keyboard</h3>

<p>$99</p>

<button onclick="buy()">Buy</button>

</div>

</section>

<div id="loginBox" class="loginBox">

<h2>Create Account</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="createAccount()">Create</button>

<button onclick="closeLogin()">Close</button>

</div>

<script src="script.js"></script>

</body>
</html>
