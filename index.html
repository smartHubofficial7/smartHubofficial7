<!DOCTYPE html>

<html>
<head>

<title>SmartHub Electronics</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#e4002b;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
border-radius:20px;
border:none;
}

/* CATEGORY */

.category{
display:flex;
gap:25px;
background:white;
padding:12px;
border-bottom:1px solid #ddd;
font-weight:bold;
}

/* BANNER */

.banner img{
width:100%;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
}

button{
background:#ff6a00;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

/* PAYMENT */

#payment{
display:none;
text-align:center;
padding:40px;
}

#qr{
display:none;
text-align:center;
padding:40px;
}

.qrimg{
width:250px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">SmartHub Electronics</div>

<input class="search" placeholder="Search electronics">

<div>Cart 🛒</div>

</div>

<div class="category">

<div>Mobiles</div>
<div>Smart Watches</div>
<div>Television</div>
<div>Fans</div>
<div>Refrigerator</div>

</div>

<div class="banner">

<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">

</div>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">

<h3>Smart Watch</h3>

<p class="price">₹1999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1581579186913-45ac1b3a66c6">

<h3>Ceiling Fan</h3>

<p class="price">₹1499</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">

<h3>Refrigerator</h3>

<p class="price">₹15999</p>

<button onclick="buy()">Buy Now</button>

</div>

</div>

<div id="payment">

<h2>Select Payment Method</h2>

<button onclick="showQR()">UPI Payment</button>

</div>

<div id="qr">

<h2>Scan QR Code to Pay</h2>

<img src="qrcode.png" class="qrimg">

<p>Open any UPI app and scan this code</p>

</div>

<footer>

© 2026 SmartHub Electronics

</footer>

<script>

function buy(){

document.querySelector(".products").style.display="none"
document.querySelector(".banner").style.display="none"

document.getElementById("payment").style.display="block"

}

function showQR(){

document.getElementById("payment").style.display="none"

document.getElementById("qr").style.display="block"

}

</script>

</body>
</html>
