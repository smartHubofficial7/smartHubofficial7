<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechHub </title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
transition:0.2s;
}

body{
background:#0f172a;
color:white;
}

/* DARK MODE */

.light{
background:white;
color:black;
}

.light header{
background:#e5e7eb;
}

.light .card{
background:white;
color:black;
}

/* HEADER */

header{
background:#020617;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:26px;
color:#38bdf8;
font-weight:bold;
}

nav{
display:flex;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
margin:6px;
font-size:15px;
cursor:pointer;
}

nav button:hover{
color:#38bdf8;
}

.search{
padding:8px;
border-radius:5px;
border:none;
}

/* CONTAINER */

.container{
padding:40px;
}

.page{
display:none;
}

.active{
display:block;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:55px;
}

.hero p{
color:#94a3b8;
margin-top:20px;
}

/* GRID */

.shop-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
margin-top:30px;
}

/* CARD */

.card{
background:#020617;
padding:20px;
border-radius:12px;
text-align:center;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#38bdf8;
font-size:20px;
margin:10px;
}

/* BUTTON */

.btn{
background:#38bdf8;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin:4px;
}

.btn:hover{
background:#0ea5e9;
}

/* CART */

.cart-item{
background:#020617;
padding:20px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

/* INPUT */

input{
padding:10px;
margin:10px 0;
width:100%;
border:none;
border-radius:5px;
}

/* QR */

.qr{
text-align:center;
margin-top:30px;
}

.qr img{
width:200px;
}

/* FOOTER */

footer{
margin-top:80px;
background:#020617;
padding:40px;
text-align:center;
}

</style>

</head>

<body>


<header>

<div class="logo">TechZone Pro</div>

<input class="search" placeholder="Search product..." onkeyup="searchProduct(this.value)">

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('cart')">Cart</button>
<button onclick="showPage('wishlist')">Wishlist</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="showPage('admin')">Admin</button>
<button onclick="toggleTheme()">Theme</button>

</nav>

</header>


<div class="container">


<div id="home" class="page active">

<div class="hero">

<h1>Best Tech Store 2026</h1>

<p>Buy laptops, phones, gaming gear</p>

<button class="btn" onclick="showPage('shop')">Start Shopping</button>

</div>

</div>


<div id="shop" class="page">

<h2>Products</h2>

<select onchange="filterPrice(this.value)">
<option value="all">All</option>
<option value="500">Under 500</option>
<option value="1000">Under 1000</option>
</select>

<div id="productGrid" class="shop-grid"></div>

</div>


<div id="cart" class="page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button class="btn" onclick="goCheckout()">Checkout</button>

</div>


<div id="wishlist" class="page">

<h2>Wishlist</h2>

<div id="wishlistItems"></div>

</div>


<div id="checkout" class="page">

<h2>Checkout</h2>

<div class="qr">

<img src="qrcode.png">

</div>

<button class="btn" onclick="placeOrder()">Payment Done</button>

</div>


<div id="orders" class="page">

<h2>Your Orders</h2>

<div id="orderList"></div>

</div>


<div id="admin" class="page">

<h2>Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button class="btn" onclick="addProduct()">Add Product</button>

</div>


</div>


<footer>

<p>© 2026 TechZone Pro Store</p>

</footer>


<script>

/* PRODUCTS */

let products=[

{name:"iPhone 15",price:999,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"MacBook Pro",price:1999,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Gaming Laptop",price:1499,img:"https://images.unsplash.com/photo-1606813909023-0f2e29e7c8e6"},
{name:"Smart Watch",price:299,img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"},
{name:"Headphones",price:199,img:"https://images.unsplash.com/photo-1580894908361-967195033215"}

]

let cart=[]
let wishlist=[]
let orders=[]

/* PAGE SWITCH */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

/* LOAD PRODUCTS */

function loadProducts(list=products){

let grid=document.getElementById("productGrid")

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<button class="btn" onclick="addToCart('${p.name}',${p.price})">Cart</button>

<button class="btn" onclick="addWishlist('${p.name}',${p.price})">Wishlist</button>

<button class="btn" onclick="rateProduct('${p.name}')">Rate</button>

</div>

`

})

}

loadProducts()

/* SEARCH */

function searchProduct(text){

let filtered=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()))

loadProducts(filtered)

}

/* CART */

function addToCart(name,price){

let item=cart.find(p=>p.name===name)

if(item) item.qty++
else cart.push({name,price,qty:1})

updateCart()

}

/* UPDATE CART */

function updateCart(){

let div=document.getElementById("cartItems")

div.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price*item.qty

div.innerHTML+=`

<div class="cart-item">

${item.name} $${item.price} × ${item.qty}

<button onclick="increase(${i})">+</button>

<button onclick="decrease(${i})">-</button>

<button onclick="removeItem(${i})">Remove</button>

</div>

`

})

document.getElementById("total").innerText="Total $"+total

}

/* CART CONTROLS */

function increase(i){

cart[i].qty++

updateCart()

}

function decrease(i){

cart[i].qty--

if(cart[i].qty<=0) cart.splice(i,1)

updateCart()

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}

/* WISHLIST */

function addWishlist(name,price){

wishlist.push({name,price})

updateWishlist()

alert("Added to wishlist")

}

function updateWishlist(){

let div=document.getElementById("wishlistItems")

div.innerHTML=""

wishlist.forEach(item=>{

div.innerHTML+=`<p>${item.name} - $${item.price}</p>`

})

}

/* RATING */

function rateProduct(name){

let rating=prompt("Rate "+name+" from 1-5")

if(rating) alert("Thanks for rating "+name+" ⭐ "+rating)

}

/* FILTER */

function filterPrice(value){

if(value=="all"){

loadProducts()

return

}

let filtered=products.filter(p=>p.price<=value)

loadProducts(filtered)

}

/* CHECKOUT */

function goCheckout(){

if(cart.length==0){

alert("Cart Empty")

return

}

showPage("checkout")

}

/* ORDER */

function placeOrder(){

orders.push([...cart])

cart=[]

updateCart()

updateOrders()

alert("Order Placed")

showPage("orders")

}

/* ORDERS */

function updateOrders(){

let div=document.getElementById("orderList")

div.innerHTML=""

orders.forEach((o,i)=>{

div.innerHTML+=`<p>Order ${i+1} - ${o.length} items</p>`

})

}

/* ADMIN */

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let img=document.getElementById("pimg").value

products.push({name,price,img})

loadProducts()

alert("Product Added")

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle("light")

}

</script>

</body>
</html>
