<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartHub Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:#0b1a2d;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

header h1{
margin:0;
}

.search{
width:40%;
padding:10px;
border-radius:5px;
border:none;
}

.top-buttons button{
margin-left:10px;
padding:10px 15px;
background:#ff9800;
border:none;
border-radius:5px;
cursor:pointer;
}

.cartcount{
background:red;
padding:2px 6px;
border-radius:50%;
font-size:12px;
}

/* PRODUCTS */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:red;
font-weight:bold;
margin:10px 0;
}

.btn{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

.cartbtn{
background:#ff9800;
}

.buybtn{
background:#4caf50;
color:white;
}

/* CART */

#cartPanel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

.cartItem{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.remove{
background:red;
color:white;
border:none;
padding:3px 6px;
cursor:pointer;
}

/* NOTIFICATION */

#notify{
position:fixed;
right:20px;
bottom:20px;
background:#4caf50;
color:white;
padding:15px;
border-radius:5px;
display:none;
}

/* PAYMENT */

#paymentBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

#paymentBox img{
width:200px;
}

/* LOGIN */

#loginBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

input{
padding:10px;
margin:5px;
width:90%;
}

</style>
</head>

<body>

<header>

<h1>SmartHub</h1>

<input class="search" placeholder="Search Products" onkeyup="searchProduct()">

<div class="top-buttons">

<button onclick="openLogin()">Login</button>

<button onclick="openCart()">Cart <span class="cartcount" id="cartCount">0</span></button>

</div>

</header>


<div class="container" id="productContainer">

<!-- PRODUCTS -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_UF1000,1000_QL80_.jpg">
<h3>Smart Watch</h3>
<div class="price">₹1999</div>
<button class="btn cartbtn" onclick="addCart('Smart Watch',1999)">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71YXzeOuslL.jpg">
<h3>Refrigerator</h3>
<div class="price">₹18999</div>
<button class="btn cartbtn" onclick="addCart('Refrigerator',18999)">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61p0G+6YdPL.jpg">
<h3>Ceiling Fan</h3>
<div class="price">₹2499</div>
<button class="btn cartbtn" onclick="addCart('Fan',2499)">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61SUj2aKoEL.jpg">
<h3>Bluetooth Earbuds</h3>
<div class="price">₹1499</div>
<button class="btn cartbtn" onclick="addCart('Earbuds',1499)">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

</div>


<!-- CART -->

<div id="cartPanel">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="buy()">Checkout</button>
<button onclick="closeCart()">Close</button>

</div>


<!-- PAYMENT -->

<div id="paymentBox">

<h2>UPI Payment</h2>

<p>Scan QR to Pay</p>

<img src="qrcode.png">

<br><br>

<button onclick="closePay()">Close</button>

</div>


<!-- LOGIN -->

<div id="loginBox">

<h2>User Login</h2>

<input placeholder="Email">
<input placeholder="Password">

<br>

<button onclick="closeLogin()">Login</button>

</div>


<div id="notify"></div>


<script>

let cart=[]
let total=0

function addCart(name,price){

cart.push({name,price})

total+=price

document.getElementById("cartCount").innerText=cart.length

renderCart()

showNotify(name+" added to cart")

}

function renderCart(){

let html=""

cart.forEach((item,i)=>{

html+=`
<div class="cartItem">
${item.name} - ₹${item.price}
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function removeItem(i){

total-=cart[i].price

cart.splice(i,1)

document.getElementById("cartCount").innerText=cart.length

renderCart()

}

function showNotify(text){

let n=document.getElementById("notify")

n.innerText=text

n.style.display="block"

setTimeout(()=>{

n.style.display="none"

},2000)

}

function openCart(){
document.getElementById("cartPanel").style.right="0"
}

function closeCart(){
document.getElementById("cartPanel").style.right="-400px"
}

function buy(){
document.getElementById("paymentBox").style.display="block"
}

function closePay(){
document.getElementById("paymentBox").style.display="none"
}

function openLogin(){
document.getElementById("loginBox").style.display="block"
}

function closeLogin(){
document.getElementById("loginBox").style.display="none"
}

function searchProduct(){

let input=document.querySelector(".search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.innerText.toLowerCase()

card.style.display=name.includes(input) ? "block":"none"

})

}

</script>

</body>
</html>
