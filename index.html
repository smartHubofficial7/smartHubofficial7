<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechZone Store</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
color:#38bdf8;
}

nav button{
background:none;
border:none;
color:white;
margin:5px;
cursor:pointer;
font-size:15px;
}

nav button:hover{
color:#38bdf8;
}

.container{
padding:30px;
}

.page{
display:none;
}

.active{
display:block;
}

.shop-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#020617;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#38bdf8;
font-size:20px;
margin:10px;
}

.btn{
background:#38bdf8;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
color:white;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}

.cart-item{
background:#020617;
padding:15px;
margin:10px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<header>

<div class="logo">TechZone</div>

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('cart')">Cart</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="showPage('about')">About</button>

</nav>

<div id="userBox"></div>

</header>

<div class="container">

<!-- HOME -->

<div id="home" class="page active">

<h1>Welcome To TechZone</h1>

<p>Best Tech Store</p>

<button class="btn" onclick="showPage('shop')">Shop Now</button>

</div>

<!-- SHOP -->

<div id="shop" class="page">

<h2>Products</h2>

<div id="productGrid" class="shop-grid"></div>

</div>

<!-- CART -->

<div id="cart" class="page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button class="btn" onclick="checkout()">Buy</button>

</div>

<!-- LOGIN -->

<div id="login" class="page">

<h2>Login</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<button class="btn" onclick="login()">Login</button>

</div>

<!-- CHECKOUT -->

<div id="checkout" class="page">

<h2>Delivery Address</h2>

<input id="address" placeholder="Full Address">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<input id="pincode" placeholder="Pincode">

<button class="btn" onclick="placeOrder()">Confirm Order</button>

</div>

<!-- PROFILE -->

<div id="profile" class="page">

<h2>My Profile</h2>

<div id="profileInfo"></div>

<button class="btn" onclick="editProfile()">Edit</button>

</div>

<!-- ORDERS -->

<div id="orders" class="page">

<h2>Your Orders</h2>

<div id="orderList"></div>

</div>

<!-- ABOUT -->

<div id="about" class="page">

<h2>About</h2>

<p>TechZone Electronics Store</p>

</div>

</div>

<script>

let products=[

{name:"iPhone 15",price:999,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"MacBook Pro",price:1999,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Gaming Laptop",price:1499,img:"https://images.unsplash.com/photo-1603302576837-37561b2e2302"},
{name:"Smart Watch",price:299,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{name:"Headphones",price:199,img:"https://images.unsplash.com/photo-1580894908361-967195033215"},
{name:"Keyboard",price:129,img:"https://images.unsplash.com/photo-1595225476474-87563907a212"}

]

let cart=[]

let orders=[]

function showPage(p){

document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

function loadProducts(){

let grid=document.getElementById("productGrid")

grid.innerHTML=""

products.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<button class="btn" onclick="addCart('${p.name}',${p.price})">Add To Cart</button>

</div>

`

})

}

loadProducts()

function addCart(name,price){

let item=cart.find(p=>p.name===name)

if(item){

item.qty++

}else{

cart.push({name,price,qty:1})

}

updateCart()

}

function updateCart(){

let div=document.getElementById("cartItems")

div.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price*item.qty

div.innerHTML+=`

<div class="cart-item">

<div>

${item.name}

<br>

$${item.price} × ${item.qty}

</div>

<div>

<button onclick="item.qty++;updateCart()">+</button>

<button onclick="removeItem(${i})">Remove</button>

</div>

</div>

`

})

document.getElementById("total").innerText="Total: $"+total

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}

function checkout(){

let user=localStorage.getItem("user")

if(!user){

alert("Login first")

showPage("login")

return

}

showPage("checkout")

}

function login(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let email=document.getElementById("email").value

let user={name,phone,email}

localStorage.setItem("user",JSON.stringify(user))

showUser()

showPage("home")

}

function showUser(){

let user=JSON.parse(localStorage.getItem("user"))

if(!user) return

document.getElementById("userBox").innerHTML=

`<span onclick="showProfile()">👤 ${user.name}</span>`

}

showUser()

function showProfile(){

let user=JSON.parse(localStorage.getItem("user"))

document.getElementById("profileInfo").innerHTML=

`
<p>Name: ${user.name}</p>
<p>Phone: ${user.phone}</p>
<p>Email: ${user.email}</p>
`

showPage("profile")

}

function editProfile(){

let user=JSON.parse(localStorage.getItem("user"))

let name=prompt("Name",user.name)
let phone=prompt("Phone",user.phone)
let email=prompt("Email",user.email)

let newUser={name,phone,email}

localStorage.setItem("user",JSON.stringify(newUser))

showUser()

showProfile()

}

function placeOrder(){

let user=JSON.parse(localStorage.getItem("user"))

let address=document.getElementById("address").value
let city=document.getElementById("city").value
let state=document.getElementById("state").value
let pincode=document.getElementById("pincode").value

let text="🛒 New Order %0A"

cart.forEach(p=>{

text+=p.name+" x "+p.qty+" %0A"

})

text+="%0A👤 Name: "+user.name
text+="%0A📞 Phone: "+user.phone
text+="%0A📧 Email: "+user.email

text+="%0A📍 Address: "+address
text+="%0ACity: "+city
text+="%0AState: "+state
text+="%0APincode: "+pincode

let url="https://wa.me/918481944109?text="+text

window.open(url)

orders.push([...cart])

cart=[]

updateCart()

alert("Order placed!")

showPage("home")

}

</script>

</body>

</html>
