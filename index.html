<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub Electronics</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* TOP HEADER */

.topbar{
background:#e4002b;
color:white;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:45%;
padding:8px;
border-radius:20px;
border:none;
}

/* CATEGORY */

.categories{
background:white;
display:flex;
gap:25px;
padding:12px;
overflow:auto;
border-bottom:1px solid #ddd;
}

.categories div{
cursor:pointer;
font-weight:bold;
}

/* BANNER */

.banner{
padding:20px;
}

.banner img{
width:100%;
border-radius:10px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#0a8f00;
font-size:18px;
font-weight:bold;
}

button{
background:#ff6600;
border:none;
padding:10px 15px;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

/* PAYMENT */

#payment{
display:none;
text-align:center;
padding:40px;
}

#qr{
display:none;
text-align:center;
padding:40px;
}

.qrimg{
width:250px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">SmartHub</div>

<input class="search" placeholder="Search Products & Brands">

<div>Cart 🛒</div>

</div>

<div class="categories">

<div>Mobiles</div>
<div>Smart Watches</div>
<div>Fans</div>
<div>Refrigerators</div>
<div>Laptops</div>
<div>Headphones</div>

</div>

<div class="banner">

<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">

</div>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">

<h3>Smart Watch</h3>

<p class="price">₹1999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">

<h3>Refrigerator</h3>

<p class="price">₹15999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1581579186913-45ac1b3a66c6">

<h3>Ceiling Fan</h3>

<p class="price">₹1499</p>

<button onclick="buy()">Buy Now</button>

</div>

</div>

<div id="payment">

<h2>Select Payment Method</h2>

<button onclick="showQR()">UPI Payment</button>

</div>

<div id="qr">

<h2>Scan QR Code</h2>

<img src="QRCODE.jpeg" class="qrimg">

<p>After payment send screenshot for confirmation.</p>

</div>

<footer>

© 2026 SmartHub Electronics Store

</footer>

<script>

function buy(){

document.querySelector(".products").style.display="none";

document.getElementById("payment").style.display="block";

}

function showQR(){

document.getElementById("payment").style.display="none";

document.getElementById("qr").style.display="block";

}

</script>

</body>
</html>
