<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechZone Pro Store</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">TechZone Pro</div>

<input class="search" placeholder="Search product..." onkeyup="searchProduct(this.value)">

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('cart')">Cart</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="showPage('about')">About</button>

</nav>

</header>

<div class="container">

<!-- HOME -->

<div id="home" class="page active">

<div class="hero">

<h1>Best Tech Store 2026</h1>

<p>Buy laptops, phones, gaming gear and accessories</p>

<br>

<button class="btn" onclick="showPage('shop')">Start Shopping</button>

</div>

</div>


<!-- SHOP -->

<div id="shop" class="page">

<h2>Tech Products</h2>

<div id="productGrid" class="shop-grid"></div>

</div>


<!-- CART -->

<div id="cart" class="page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<br>

<button class="btn" onclick="goCheckout()">Checkout</button>

</div>


<!-- CHECKOUT -->

<div id="checkout" class="page">

<h2>Checkout</h2>

<p>Scan QR Code To Pay</p>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Payment">

</div>

<br>

<button class="btn" onclick="placeOrder()">Payment Done</button>

</div>


<!-- ORDERS -->

<div id="orders" class="page">

<h2>Your Orders</h2>

<div id="orderList"></div>

</div>


<!-- ABOUT -->

<div id="about" class="page">

<h2>About TechZone</h2>

<p>

TechZone Pro is a modern electronics store.
Buy phones, gaming laptops, VR gear and accessories.

</p>

</div>

</div>


<footer>

<p>© 2026 TechZone Pro Store</p>

</footer>

<script src="script.js"></script>

</body>
</html>
