<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

button{
cursor:pointer;
}

/* LOGIN BUTTON */

#loginBtn{
padding:10px 18px;
font-size:16px;
background:#00ff9d;
border:none;
border-radius:6px;
}

/* SEARCH */

.search{
padding:10px;
width:90%;
margin:15px auto;
display:block;
font-size:16px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

.price{
color:#00ff9d;
font-weight:bold;
}

.buy{
margin-top:10px;
background:#00ff9d;
border:none;
padding:10px;
width:100%;
border-radius:6px;
}

/* CART */

#cartBtn{
background:#ffcc00;
padding:10px;
border:none;
border-radius:6px;
}

.cart{
position:fixed;
right:-400px;
top:0;
width:300px;
height:100%;
background:#000;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart h2{
margin-top:0;
}

.cart-item{
margin-bottom:10px;
border-bottom:1px solid #333;
padding-bottom:5px;
}

/* QR */

.qr{
text-align:center;
margin-top:20px;
}

.qr img{
width:200px;
}

/* MOBILE */

@media(max-width:600px){

.logo{
font-size:18px;
}

#loginBtn{
font-size:14px;
padding:8px 14px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">SmartHub</div>

<div>

<button id="loginBtn" onclick="login()">Login</button>

<button id="cartBtn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>

</div>

</header>

<input type="text" class="search" id="searchBox" placeholder="Search product...">

<div class="products" id="products">

<!-- PRODUCT 1 -->

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Smart Watch</h3>
<p class="price">$50</p>
<button class="buy" onclick="addToCart('Smart Watch')">Add to Cart</button>
</div>

<!-- PRODUCT 2 -->

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Gaming Mouse</h3>
<p class="price">$30</p>
<button class="buy" onclick="addToCart('Gaming Mouse')">Add to Cart</button>
</div>

<!-- PRODUCT 3 -->

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Bluetooth Speaker</h3>
<p class="price">$40</p>
<button class="buy" onclick="addToCart('Speaker')">Add to Cart</button>
</div>

<!-- PRODUCT 4 -->

<div class="card">
<img src="https://picsum.photos/300/200?4">
<h3>Wireless Earbuds</h3>
<p class="price">$25</p>
<button class="buy" onclick="addToCart('Earbuds')">Add to Cart</button>
</div>

</div>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<button class="buy" onclick="buy()">Buy Now</button>

<div class="qr" id="qrBox" style="display:none">

<h3>Scan To Pay</h3>

<img src="qrcode.png">

<p>After payment send screenshot</p>

</div>

</div>

<script>

let cart=[]

function login(){

let user=prompt("Enter username")

if(user){
alert("Welcome "+user)
}

}

function addToCart(product){

cart.push(product)

updateCart()

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

let list=""

cart.forEach(item=>{
list+=`<div class="cart-item">${item}</div>`
})

document.getElementById("cartItems").innerHTML=list

}

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

function buy(){

if(cart.length==0){
alert("Cart empty")
return
}

document.getElementById("qrBox").style.display="block"

}

document.getElementById("searchBox").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(value) ? "block":"none"

})

})

</script>

</body>
</html>
