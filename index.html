<!DOCTYPE html>

<html>
<head>
<title>SmartHub Electronics</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#e4002b;
padding:15px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
border-radius:20px;
border:none;
}

/* BANNER */

.banner img{
width:100%;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:25px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
}

button{
background:#ff6600;
border:none;
padding:10px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* PAYMENT */

#payment{
display:none;
text-align:center;
padding:40px;
}

#qr{
display:none;
text-align:center;
padding:40px;
}

.qrimg{
width:250px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>

<div class="logo">SmartHub Electronics</div>

<input class="search" placeholder="Search products">

<div>Cart 🛒</div>

</header>

<div class="banner">

<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">

</div>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">

<h3>Smart Watch</h3>

<p class="price">₹1999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">

<h3>Refrigerator</h3>

<p class="price">₹15999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1581579186913-45ac1b3a66c6">

<h3>Ceiling Fan</h3>

<p class="price">₹1499</p>

<button onclick="buy()">Buy Now</button>

</div>

</div>

<div id="payment">

<h2>Select Payment Method</h2>

<button onclick="showQR()">Pay with UPI</button>

</div>

<div id="qr">

<h2>Scan QR Code to Pay</h2>

<img src="QRCODE.jpeg" class="qrimg">

<p>After payment send screenshot.</p>

</div>

<footer>

© 2026 SmartHub Electronics

</footer>

<script>

function buy(){

document.querySelector(".products").style.display="none";
document.getElementById("payment").style.display="block";

}

function showQR(){

document.getElementById("payment").style.display="none";
document.getElementById("qr").style.display="block";

}

</script>

</body>
</html>
