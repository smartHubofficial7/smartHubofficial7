<!DOCTYPE html>
<html>
<head>

<title>SmartHub Electronics</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#131921;
color:white;
display:flex;
flex-wrap:wrap;
justify-content:space-between;
padding:12px;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
padding:8px;
width:300px;
max-width:100%;
border:none;
border-radius:5px;
}

/* PRODUCTS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:red;
font-size:18px;
font-weight:bold;
}

/* BUTTON */

button{
padding:10px 15px;
border:none;
background:#ff9900;
margin:5px;
border-radius:5px;
cursor:pointer;
}

/* CART PANEL */

.cart{
position:fixed;
right:0;
top:0;
width:320px;
max-width:90%;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.2);
padding:20px;
display:none;
overflow:auto;
}

/* NOTIFICATION */

.toast{
position:fixed;
right:20px;
bottom:20px;
background:#4CAF50;
color:white;
padding:12px 20px;
border-radius:6px;
display:none;
}

/* PAYMENT */

.payment{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.paybox{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
max-width:90%;
}

.qr{
width:200px;
max-width:100%;
}

/* MOBILE OPTIMIZATION */

@media(max-width:600px){

.logo{
font-size:18px;
}

.search{
width:100%;
margin-top:8px;
}

button{
width:100%;
margin-top:8px;
}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">SmartHub</div>

<input class="search" placeholder="Search electronics">

<button onclick="openCart()">Cart</button>

</div>

<div class="container" id="products"></div>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button onclick="showPayment()">Pay Now</button>

</div>

<div class="toast" id="toast">
Product Added to Cart
</div>

<div class="payment" id="payment">

<div class="paybox">

<h2>UPI Payment</h2>

<p>Scan QR Code</p>

<img src="qrcode.png" class="qr">

<br><br>

<button onclick="closePay()">Close</button>

</div>

</div>

<script>

let products=[

{
name:"Smart Watch",
price:1999,
img:"https://m.media-amazon.com/images/I/61akt30bJsL._AC_SL1500_.jpg"
},

{
name:"Refrigerator",
price:18999,
img:"https://m.media-amazon.com/images/I/61Yx5-N155L._AC_SL1500_.jpg"
},

{
name:"Ceiling Fan",
price:2499,
img:"https://m.media-amazon.com/images/I/61XKX6D6x0L._AC_SL1500_.jpg"
},

{
name:"Bluetooth Earbuds",
price:1499,
img:"https://m.media-amazon.com/images/I/51HBom8xz7L._AC_SL1500_.jpg"
}

]

let cart=[]
let total=0

function loadProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick="addCart(${i})">Add to Cart</button>

<button onclick="buyNow()">Buy Now</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}

loadProducts()

function addCart(i){

cart.push(products[i])

total+=products[i].price

document.getElementById("total").innerText=total

let item=document.createElement("div")

item.innerHTML=products[i].name+" ₹"+products[i].price

document.getElementById("cartItems").appendChild(item)

showToast()

}

function openCart(){

document.getElementById("cart").style.display="block"

}

function showToast(){

let t=document.getElementById("toast")

t.style.display="block"

setTimeout(()=>{

t.style.display="none"

},2000)

}

function buyNow(){

showPayment()

}

function showPayment(){

document.getElementById("payment").style.display="flex"

}

function closePay(){

document.getElementById("payment").style.display="none"

}

</script>

</body>
</html>
