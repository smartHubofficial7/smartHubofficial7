<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartHub Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(120deg,#f2f2f2,#e6f0ff);
}

/* HEADER */

header{
background:#111;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
color:#00bfff;
}

.search input{
padding:8px;
width:260px;
border-radius:5px;
border:none;
}

.cart{
font-size:18px;
}

/* CATEGORY */

.categories{
background:white;
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
border-bottom:1px solid #ddd;
}

.categories button{
padding:8px 15px;
border:none;
background:#eee;
border-radius:5px;
cursor:pointer;
}

.categories button:hover{
background:#ddd;
}

/* PRODUCT GRID */

.container{
padding:25px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

/* PRODUCT CARD */

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.image-box{
height:160px;
display:flex;
align-items:center;
justify-content:center;
}

.image-box img{
max-width:100%;
max-height:150px;
object-fit:contain;
}

.title{
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.stars{
color:orange;
}

.price{
color:red;
font-weight:bold;
margin:5px 0;
}

.buttons{
margin-top:10px;
}

.btn{
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

.cartbtn{
background:orange;
color:white;
}

.buybtn{
background:#28a745;
color:white;
}

/* FOOTER */

footer{
margin-top:40px;
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>

<div class="logo">SmartHub</div>

<div class="search">
<input type="text" placeholder="Search product...">
</div>

<div class="cart">
🛒 Cart: <span id="cartCount">0</span>
</div>

</header>

<div class="categories">

<button>All</button>
<button>Mobiles</button>
<button>Laptops</button>
<button>Gaming</button>
<button>Home Appliances</button>
<button>Accessories</button>

</div>

<div class="container">

<!-- PHONE -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/61-r9zOKBCL._AC_UY218_.jpg">
</div>
<div class="title">Smart Phone</div>
<div class="stars">★★★★★</div>
<div class="price">₹7999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- GAMING LAPTOP -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/71jG+e7roXL._AC_UY218_.jpg">
</div>
<div class="title">Gaming Laptop</div>
<div class="stars">★★★★★</div>
<div class="price">₹55999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- NORMAL LAPTOP -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/71TPda7cwUL._AC_UY218_.jpg">
</div>
<div class="title">Office Laptop</div>
<div class="stars">★★★★☆</div>
<div class="price">₹35999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- HEADPHONE -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/61KNJav3S9L._AC_UY218_.jpg">
</div>
<div class="title">Gaming Headphones</div>
<div class="stars">★★★★★</div>
<div class="price">₹2499</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- WATCH -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_UY218_.jpg">
</div>
<div class="title">Smart Watch</div>
<div class="stars">★★★★☆</div>
<div class="price">₹1999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- TV -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/81fxjeu8fdL._AC_UY218_.jpg">
</div>
<div class="title">LED TV</div>
<div class="stars">★★★★★</div>
<div class="price">₹29999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- FRIDGE -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/71WvVq1W1VL._AC_UY218_.jpg">
</div>
<div class="title">Refrigerator</div>
<div class="stars">★★★★☆</div>
<div class="price">₹18999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

<!-- AC -->
<div class="card">
<div class="image-box">
<img src="https://m.media-amazon.com/images/I/51R5N4CqZXL._AC_UY218_.jpg">
</div>
<div class="title">Air Conditioner</div>
<div class="stars">★★★★★</div>
<div class="price">₹32999</div>
<div class="buttons">
<button class="btn cartbtn" onclick="addCart()">Add to Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>
</div>

</div>

<footer>

SmartHub Store © 2025  
Best Online Electronics Store

</footer>

<script>

let cart = 0;

function addCart(){

cart++;

document.getElementById("cartCount").innerText = cart;

alert("Product Added To Cart");

}

function buy(){

alert("Redirecting to Payment...");

}

</script>

</body>
</html>
