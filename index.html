<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartHub Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

button{
cursor:pointer;
border:none;
padding:10px 15px;
border-radius:5px;
}

.loginBtn{
background:#00bcd4;
color:white;
}

.cartBtn{
background:orange;
color:white;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
color:green;
font-weight:bold;
margin:10px;
}

.buyBtn{
background:green;
color:white;
width:100%;
}

.cartBox{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 10px rgba(0,0,0,0.3);
padding:20px;
transition:0.4s;
overflow:auto;
}

.cartItem{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.orderPage{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
padding:20px;
overflow:auto;
}

input{
width:100%;
padding:10px;
margin:5px 0 15px;
}

.payBox{
text-align:center;
margin-top:20px;
}

.payBox img{
width:200px;
}

@media(max-width:600px){

.logo{
font-size:18px;
}

.loginBtn,.cartBtn{
padding:8px 10px;
font-size:14px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">SmartHub</div>

<div>
<button class="loginBtn" onclick="login()">Login</button>
<button class="cartBtn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

</header>

<div class="container" id="products"></div>

<div class="cartBox" id="cart">

<h2>Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button onclick="checkout()">Buy</button>

</div>

<div class="orderPage" id="orderPage">

<h2>Order Details</h2>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone Number">

<input id="address" placeholder="Address">

<input id="city" placeholder="City">

<input id="pincode" placeholder="Pincode">

<div class="payBox">

<h3>Scan QR To Pay</h3>

<img src="qrcode.png">

<br><br>

<button onclick="placeOrder()">Payment Done</button>

</div>

</div>

<script>

let products=[
{
name:"Samsung Galaxy M17 5G",
price:12999,
img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
},

{
name:"iQOO Z10 Lite 5G",
price:10999,
img:"https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5"
},

{
name:"Redmi A4 5G",
price:8999,
img:"https://images.unsplash.com/photo-1512499617640-c2f999098c01"
},

{
name:"Samsung Galaxy M06 5G",
price:7999,
img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"
},

{
name:"Samsung Galaxy S26 Ultra 5G",
price:119999,
img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
}

]

let cart=[]

function loadProducts(){

let box=document.getElementById("products")

products.forEach((p,i)=>{

box.innerHTML+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button class="buyBtn" onclick="addCart(${i})">Add To Cart</button>

</div>

`

})

}

loadProducts()

function addCart(i){

cart.push(products[i])

updateCart()

}

function updateCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

cart.forEach(p=>{

items.innerHTML+=`

<div class="cartItem">

${p.name}

<br>

₹${p.price}

</div>

`

total+=p.price

})

document.getElementById("total").innerText=total

document.getElementById("cartCount").innerText=cart.length

}

function toggleCart(){

let c=document.getElementById("cart")

if(c.style.right=="0px"){

c.style.right="-350px"

}else{

c.style.right="0"

}

}

function login(){

let name=prompt("Enter Name")

let phone=prompt("Enter Phone")

localStorage.setItem("userName",name)

localStorage.setItem("userPhone",phone)

alert("Login Successful")

}

function checkout(){

if(!localStorage.getItem("userName")){

alert("Login First")

return

}

document.getElementById("orderPage").style.display="block"

}

function placeOrder(){

alert("Order Placed Successfully")

cart=[]

updateCart()

document.getElementById("orderPage").style.display="none"

}

</script>

</body>
</html>
