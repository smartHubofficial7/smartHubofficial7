<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectroStore</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

.cart{
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:#007bff;
color:white;
}

.buy{
background:#28a745;
color:white;
}

#notification{
position:fixed;
right:-300px;
top:20px;
background:#28a745;
color:white;
padding:15px;
border-radius:5px;
transition:0.5s;
}

#cartPanel{
position:fixed;
right:-400px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

#payment{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.paybox{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.paybox img{
width:220px;
}

</style>
</head>

<body>

<header>

<div class="logo">ElectroStore</div>

<div class="cart" onclick="openCart()">
🛒 Cart (<span id="count">0</span>)
</div>

</header>

<div id="notification">Added to Cart</div>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
<h3>Smart Watch</h3>
<p>$49</p>
<button class="add" onclick="addCart('Smart Watch')">Add Cart</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
<h3>Refrigerator</h3>
<p>$399</p>
<button class="add" onclick="addCart('Refrigerator')">Add Cart</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1582719471386-3f2a3a71c64f">
<h3>Ceiling Fan</h3>
<p>$29</p>
<button class="add" onclick="addCart('Fan')">Add Cart</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1518441902112-fc13a5b94af6">
<h3>Headphones</h3>
<p>$59</p>
<button class="add" onclick="addCart('Headphones')">Add Cart</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

</div>


<div id="cartPanel">
<h2>Your Cart</h2>
<ul id="cartItems"></ul>
</div>


<div id="payment">
<div class="paybox">
<h2>Scan & Pay</h2>
<img src="qrcode.png">
<br><br>
<button onclick="closePay()">Close</button>
</div>
</div>


<script>

let cart=[]

function addCart(product){

cart.push(product)

document.getElementById("count").innerText=cart.length

let li=document.createElement("li")
li.innerText=product
document.getElementById("cartItems").appendChild(li)

let n=document.getElementById("notification")

n.style.right="20px"

setTimeout(()=>{
n.style.right="-300px"
},2000)

}

function openCart(){

let panel=document.getElementById("cartPanel")

if(panel.style.right=="0px"){
panel.style.right="-400px"
}else{
panel.style.right="0px"
}

}

function buy(){

document.getElementById("payment").style.display="flex"

}

function closePay(){

document.getElementById("payment").style.display="none"

}

</script>

</body>
</html>
