<!DOCTYPE html>
<html>
<head>
<title>SmartHub Electronics</title>

<style>

body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:20px;
margin:10px 0;
color:#38bdf8;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.payment{
text-align:center;
padding:40px;
background:#020617;
}

.qr{
width:220px;
border-radius:10px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>
</head>

<body>

<header>
SmartHub Electronics Store
</header>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Smart Watch</h3>
<div class="price">₹1499</div>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Ceiling Fan</h3>
<div class="price">₹2199</div>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1586201375761-83865001e17b">
<h3>Refrigerator</h3>
<div class="price">₹18999</div>
<button onclick="buy()">Buy Now</button>
</div>

</section>

<section class="payment">

<h2>Scan & Pay</h2>

<p>After payment send screenshot</p>

<img class="qr" src="QRCODE.jpeg">

<p>UPI: 8481944109@fam</p>

</section>

<footer>
SmartHub © 2026
</footer>

<script>

function buy(){
alert("Scroll down and scan QR code to complete payment");
window.location="#payment";
}

</script>

</body>
</html>
