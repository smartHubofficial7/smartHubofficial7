<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMART HUB</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
<img src="SMARTHUB-logo.png">
<h2>SMART HUB</h2>
</div>

<input type="text" id="search" placeholder="Search products...">

<div class="icons">
<button onclick="openCart()">🛒 Cart</button>
</div>

</header>

<section class="products" id="productList">

<div class="product">
<img src="https://m.media-amazon.com/images/I/61LtuGzXeaL.jpg">
<h3>Smart Watch</h3>
<p>⭐⭐⭐⭐☆</p>
<p>₹1999</p>
<button onclick="addCart('Smart Watch',1999)">Add to Cart</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/71vFKBpKakL.jpg">
<h3>Wireless Headphones</h3>
<p>⭐⭐⭐⭐⭐</p>
<p>₹2999</p>
<button onclick="addCart('Headphones',2999)">Add to Cart</button>
</div>

<div class="product">
<img src="https://m.media-amazon.com/images/I/61uA2UVnYWL.jpg">
<h3>Gaming Mouse</h3>
<p>⭐⭐⭐⭐</p>
<p>₹999</p>
<button onclick="addCart('Mouse',999)">Add to Cart</button>
</div>

</section>


<div class="cart" id="cart">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<p id="total"></p>

<button onclick="closeCart()">Close</button>

</div>

<script src="script.js"></script>

</body>
</html>
