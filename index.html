<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartHub Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:#0b1a2d;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

header h1{
margin:0;
}

.search{
width:40%;
padding:10px;
border-radius:5px;
border:none;
}

.top-buttons button{
margin-left:10px;
padding:10px 15px;
background:#ff9800;
border:none;
border-radius:5px;
cursor:pointer;
}

/* PRODUCTS */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:red;
font-weight:bold;
margin:10px 0;
}

.btn{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

.cartbtn{
background:#ff9800;
}

.buybtn{
background:#4caf50;
color:white;
}

/* CART */

#cartPanel{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

#cartPanel h2{
margin-top:0;
}

/* NOTIFICATION */

#notify{
position:fixed;
right:20px;
bottom:20px;
background:#4caf50;
color:white;
padding:15px;
border-radius:5px;
display:none;
}

/* PAYMENT */

#paymentBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

#paymentBox img{
width:200px;
}

/* LOGIN */

#loginBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

input{
padding:10px;
margin:5px;
width:90%;
}

</style>
</head>

<body>

<header>

<h1>SmartHub</h1>

<input class="search" placeholder="Search Products">

<div class="top-buttons">

<button onclick="openLogin()">Login</button>
<button onclick="openCart()">Cart</button>

</div>

</header>


<div class="container">

<!-- PRODUCT 1 -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_UF1000,1000_QL80_.jpg">
<h3>Smart Watch</h3>
<div class="price">₹1999</div>
<button class="btn cartbtn" onclick="addCart('Smart Watch')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>


<!-- PRODUCT 2 -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/71YXzeOuslL.jpg">
<h3>Refrigerator</h3>
<div class="price">₹18999</div>
<button class="btn cartbtn" onclick="addCart('Refrigerator')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>


<!-- PRODUCT 3 -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/61p0G+6YdPL.jpg">
<h3>Ceiling Fan</h3>
<div class="price">₹2499</div>
<button class="btn cartbtn" onclick="addCart('Fan')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>


<!-- PRODUCT 4 -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/61SUj2aKoEL.jpg">
<h3>Bluetooth Earbuds</h3>
<div class="price">₹1499</div>
<button class="btn cartbtn" onclick="addCart('Earbuds')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>


<!-- PRODUCT 5 -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/71TPda7cwUL.jpg">
<h3>Gaming Laptop</h3>
<div class="price">₹55999</div>
<button class="btn cartbtn" onclick="addCart('Laptop')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>


<!-- PRODUCT 6 -->

<div class="card">
<img src="https://m.media-amazon.com/images/I/61-r9zOKBCL.jpg">
<h3>LED TV</h3>
<div class="price">₹29999</div>
<button class="btn cartbtn" onclick="addCart('TV')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>


</div>


<!-- CART PANEL -->

<div id="cartPanel">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<button onclick="buy()">Checkout</button>

</div>


<!-- PAYMENT -->

<div id="paymentBox">

<h2>UPI Payment</h2>

<p>Scan QR to Pay</p>

<img src="qrcode.png">

<br><br>

<button onclick="closePay()">Close</button>

</div>


<!-- LOGIN -->

<div id="loginBox">

<h2>User Login</h2>

<input placeholder="Email">
<input placeholder="Password">

<br>

<button onclick="closeLogin()">Login</button>

</div>


<div id="notify"></div>


<script>

let cart=[];

function addCart(item){

cart.push(item)

document.getElementById("cartItems").innerHTML+=`<li>${item}</li>`

showNotify(item+" added to cart")

}

function showNotify(text){

let n=document.getElementById("notify")

n.innerText=text

n.style.display="block"

setTimeout(()=>{

n.style.display="none"

},2000)

}

function openCart(){

document.getElementById("cartPanel").style.right="0"

}

function buy(){

document.getElementById("paymentBox").style.display="block"

}

function closePay(){

document.getElementById("paymentBox").style.display="none"

}

function openLogin(){

document.getElementById("loginBox").style.display="block"

}

function closeLogin(){

document.getElementById("loginBox").style.display="none"

}

</script>

</body>
</html>
