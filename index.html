<!DOCTYPE html>
<html>
<head>
<title>My Electronic Store</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:black;
color:white;
padding:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

#paymentBox{
display:none;
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
width:300px;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<header>
<h1>My Electronic Store</h1>
<p>Fridge | Smart Watch | Fan</p>
</header>


<div class="products">

<div class="card">
<h3>Smart Watch</h3>
<p>Price ₹2000</p>
<button onclick="buyProduct('Smart Watch','2000')">Buy Now</button>
</div>

<div class="card">
<h3>Fridge</h3>
<p>Price ₹15000</p>
<button onclick="buyProduct('Fridge','15000')">Buy Now</button>
</div>

<div class="card">
<h3>Fan</h3>
<p>Price ₹2500</p>
<button onclick="buyProduct('Fan','2500')">Buy Now</button>
</div>

</div>


<div id="paymentBox">

<h2>Scan & Pay</h2>

<img src="qr.png" width="200">

<p>Scan this QR and complete payment</p>

<button onclick="sendMessage()">I Have Paid</button>

</div>


<script>

let productName="";
let price="";

function buyProduct(name,p){

productName=name;
price=p;

document.getElementById("paymentBox").style.display="block";

}

function sendMessage(){

let phone="91XXXXXXXXXX";

let msg="Order Received %0A Product: "+productName+" %0A Price: ₹"+price;

window.open("https://wa.me/"+phone+"?text="+msg);

}

</script>

</body>
</html>
