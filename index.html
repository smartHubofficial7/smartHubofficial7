<!DOCTYPE html>
<html>
<head>
<title>SmartHub Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#131921;
color:white;
padding:15px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
border:none;
border-radius:5px;
}

.nav-btn{
background:#ff9900;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

/* PRODUCT GRID */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.price{
color:red;
font-weight:bold;
font-size:20px;
}

button{
background:#ff9900;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

/* LOGIN POPUP */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

input{
padding:10px;
margin:5px;
width:200px;
}

/* CART */

.cart{
position:fixed;
right:0;
top:0;
background:white;
width:300px;
height:100%;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
display:none;
overflow:auto;
}

.qr{
width:200px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">SmartHub</div>

<input class="search" placeholder="Search Products">

<div>

<button class="nav-btn" onclick="login()">Login</button>
<button class="nav-btn" onclick="openCart()">Cart</button>

</div>

</div>

<!-- PRODUCTS -->

<div class="container" id="products"></div>

<!-- LOGIN -->

<div class="popup" id="loginBox">

<div class="box">

<h2>User Login</h2>

<input placeholder="Email"><br>
<input placeholder="Password" type="password"><br><br>

<button onclick="closeLogin()">Login</button>

</div>

</div>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button onclick="pay()">Pay Now</button>

<br><br>

<img src="qrcode.png" class="qr">

</div>

<script>

/* PRODUCT DATABASE */

let products=[

{
name:"Smart Watch",
price:1999,
img:"https://m.media-amazon.com/images/I/61y2VVWcGBL._AC_SL1500_.jpg"
},

{
name:"Refrigerator",
price:18999,
img:"https://m.media-amazon.com/images/I/61Yx5-N155L._AC_SL1500_.jpg"
},

{
name:"Bluetooth Earbuds",
price:1499,
img:"https://m.media-amazon.com/images/I/51HBom8xz7L._AC_SL1500_.jpg"
},

{
name:"Ceiling Fan",
price:2499,
img:"https://m.media-amazon.com/images/I/61XKX6D6x0L._AC_SL1500_.jpg"
},

{
name:"Laptop",
price:55999,
img:"https://m.media-amazon.com/images/I/71jG+e7roXL._AC_SL1500_.jpg"
}

]

let cart=[]
let total=0

/* LOAD PRODUCTS */

function loadProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick="addCart(${i})">Add To Cart</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}

loadProducts()

/* CART */

function addCart(i){

cart.push(products[i])

total+=products[i].price

document.getElementById("total").innerText=total

let item=document.createElement("p")

item.innerText=products[i].name+" ₹"+products[i].price

document.getElementById("cartItems").appendChild(item)

}

function openCart(){

document.getElementById("cart").style.display="block"

}

/* LOGIN */

function login(){

document.getElementById("loginBox").style.display="flex"

}

function closeLogin(){

document.getElementById("loginBox").style.display="none"

}

/* PAYMENT */

function pay(){

alert("Scan QR Code to Pay")

}

</script>

</body>
</html>
