<!DOCTYPE html>
<html>
<head>
<title>Rehan Electronics Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.price{
color:green;
font-size:20px;
}

button{
background:#ff6600;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff3300;
}

#cart{
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:10px;
border-radius:8px;
}

#payment{
display:none;
text-align:center;
padding:40px;
}

.qr{
width:250px;
}

</style>

</head>

<body>

<header>
⚡ REHAN ELECTRONICS STORE
</header>

<div id="cart">
🛒 Cart: <span id="count">0</span>
</div>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
<h3>Smart Watch</h3>
<p class="price">₹1999</p>
<button onclick="add()">Add to Cart</button>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
<h3>Fan</h3>
<p class="price">₹1499</p>
<button onclick="add()">Add to Cart</button>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
<h3>Refrigerator</h3>
<p class="price">₹15999</p>
<button onclick="add()">Add to Cart</button>
<button onclick="buy()">Buy Now</button>
</div>

</div>

<div id="payment">

<h2>Scan QR Code to Pay</h2>

<img src="QRCODE.jpeg" class="qr">

<p>After payment send screenshot on WhatsApp</p>

</div>

<script>

let count=0;

function add(){
count++;
document.getElementById("count").innerText=count;
}

function buy(){
document.querySelector(".products").style.display="none";
document.getElementById("payment").style.display="block";
}

</script>

</body>
</html>
