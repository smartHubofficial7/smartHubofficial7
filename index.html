<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone Pro Store | 2026 Edition</title>
    <!-- Google Fonts for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --primary: #38bdf8;
            --primary-dark: #0ea5e9;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background: rgba(2, 6, 23, 0.95);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #334155;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 28px;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        nav button:hover, nav button.active {
            color: var(--primary);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            background: var(--bg-card);
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            width: 250px;
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            width: 300px;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 20px;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--primary);
            color: var(--bg-dark);
            font-size: 12px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* --- CONTAINER --- */
        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 70%);
            border-radius: 20px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 60px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .btn {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        /* --- FILTERS --- */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid #334155;
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        /* --- GRID & CARDS --- */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-img-wrapper {
            height: 220px;
            overflow: hidden;
            background: #000;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-body {
            padding: 20px;
            text-align: left;
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .card .category {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .card .price {
            color: var(--primary);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
        }

        .add-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .add-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        /* --- CART PAGE --- */
        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .cart-items {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #334155;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-item-info img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-dark);
            padding: 5px;
            border-radius: 6px;
        }

        .qty-btn {
            background: var(--bg-card);
            border: none;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-summary {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            height: fit-content;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .total-row {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            border-top: 1px solid #334155;
            padding-top: 15px;
            margin-top: 15px;
        }

        /* --- CHECKOUT --- */
        .checkout-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .qr-placeholder {
            width: 250px;
            height: 250px;
            background: white;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            border-radius: 10px;
        }

        /* --- FORMS --- */
        .form-box {
            max-width: 400px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
        }

        .form-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--bg-dark);
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
        }

        .form-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* --- FOOTER --- */
        footer {
            margin-top: 80px;
            background: #020617;
            padding: 60px 40px;
            border-top: 1px solid #334155;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-col h4 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .footer-col p, .footer-col a {
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
            text-decoration: none;
        }

        .footer-col a:hover {
            color: var(--primary);
        }

        /* --- RESPONSIVE --- */
        @media(max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .cart-container {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">TechZone Pro</div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProduct(this.value)">
        </div>

        <nav class="nav-links">
            <button onclick="showPage('home')">Home</button>
            <button onclick="showPage('shop')">Shop</button>
            <button onclick="showPage('cart')">Cart <span class="cart-count" id="cartCount">0</span></button>
            <button onclick="showPage('orders')">Orders</button>
            <button onclick="showPage('login')">Login</button>
        </nav>
    </header>

    <div class="container">

        <!-- HOME PAGE -->
        <div id="home" class="page active">
            <div class="hero">
                <h1>Future Tech is Here</h1>
                <p>Discover the latest gadgets, high-performance laptops, and premium accessories. Upgrade your life with TechZone Pro.</p>
                <button class="btn" onclick="showPage('shop')">Start Shopping</button>
            </div>

            <h2 style="text-align:center; margin-bottom:20px;">Featured Categories</h2>
            <div class="filters">
                <button class="filter-btn active" onclick="filterProducts('all')">All Products</button>
