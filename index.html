<!DOCTYPE html>
<html>
<head>
<title>SmartHub Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:15px;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
}

/* PRODUCTS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.price{
color:red;
font-size:20px;
font-weight:bold;
}

/* BUTTON */

button{
padding:10px 15px;
border:none;
background:#ff9900;
margin:5px;
border-radius:5px;
cursor:pointer;
}

/* CART */

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.2);
padding:20px;
display:none;
overflow:auto;
}

/* NOTIFICATION */

.toast{
position:fixed;
right:20px;
top:80px;
background:#4CAF50;
color:white;
padding:15px;
border-radius:5px;
display:none;
}

/* PAYMENT */

.payment{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.paybox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

.qr{
width:200px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">SmartHub</div>

<input class="search" placeholder="Search Products">

<button onclick="openCart()">Cart</button>

</div>

<div class="container" id="products"></div>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<button onclick="showPayment()">Pay Now</button>

</div>

<div class="toast" id="toast">
Item Added To Cart
</div>

<div class="payment" id="payment">

<div class="paybox">

<h2>Scan QR to Pay</h2>

<img src="qrcode.png" class="qr">

<br><br>

<button onclick="closePay()">Close</button>

</div>

</div>

<script>

/* PRODUCTS */

let products=[

{
name:"Smart Watch",
price:1999,
img:"https://m.media-amazon.com/images/I/61akt30bJsL._AC_SL1500_.jpg"
},

{
name:"Refrigerator",
price:18999,
img:"https://m.media-amazon.com/images/I/61Yx5-N155L._AC_SL1500_.jpg"
},

{
name:"Ceiling Fan",
price:2499,
img:"https://m.media-amazon.com/images/I/61XKX6D6x0L._AC_SL1500_.jpg"
},

{
name:"Bluetooth Earbuds",
price:1499,
img:"https://m.media-amazon.com/images/I/51HBom8xz7L._AC_SL1500_.jpg"
}

]

let cart=[]
let total=0

/* LOAD PRODUCTS */

function loadProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<p class="price">₹${p.price}</p>

<button onclick="addCart(${i})">Add To Cart</button>

<button onclick="buyNow(${i})">Buy Now</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}

loadProducts()

/* ADD CART */

function addCart(i){

cart.push(products[i])

total+=products[i].price

document.getElementById("total").innerText=total

let item=document.createElement("div")

item.innerHTML=products[i].name+" ₹"+products[i].price+
` <button onclick="removeItem(this,${products[i].price})">X</button>`

document.getElementById("cartItems").appendChild(item)

showToast()

}

/* REMOVE ITEM */

function removeItem(btn,price){

btn.parentElement.remove()

total-=price

document.getElementById("total").innerText=total

}

/* BUY NOW */

function buyNow(i){

showPayment()

}

/* CART */

function openCart(){

document.getElementById("cart").style.display="block"

}

/* TOAST */

function showToast(){

let t=document.getElementById("toast")

t.style.display="block"

setTimeout(()=>{

t.style.display="none"

},2000)

}

/* PAYMENT */

function showPayment(){

document.getElementById("payment").style.display="flex"

}

function closePay(){

document.getElementById("payment").style.display="none"

}

</script>

</body>
</html>
