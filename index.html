<!DOCTYPE html>
<html>
<head>
<title>SmartHub Electronics</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#e4002b;
color:white;
padding:15px;
font-size:24px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.price{
color:red;
font-size:20px;
font-weight:bold;
}

button{
background:#ff9900;
border:none;
padding:10px 20px;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff7700;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.payment{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

.qr{
width:220px;
margin-top:20px;
}

</style>
</head>

<body>

<header>SmartHub Electronics</header>

<div class="container">

<div class="card">
<img src="https://m.media-amazon.com/images/I/61y2VVWcGBL._AC_SL1500_.jpg">
<h3>Smart Watch</h3>
<p class="price">₹1999</p>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61Yx5-N155L._AC_SL1500_.jpg">
<h3>Refrigerator</h3>
<p class="price">₹18999</p>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61XKX6D6x0L._AC_SL1500_.jpg">
<h3>Ceiling Fan</h3>
<p class="price">₹2499</p>
<button onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/51HBom8xz7L._AC_SL1500_.jpg">
<h3>Bluetooth Earbuds</h3>
<p class="price">₹1499</p>
<button onclick="buy()">Buy Now</button>
</div>

</div>

<div class="popup" id="payment">

<div class="payment">

<h2>UPI Payment</h2>

<p>Scan QR Code to Pay</p>

<img src="qrcode.png" class="qr">

<br><br>

<button onclick="closePay()">Close</button>

</div>

</div>

<script>

function buy(){
document.getElementById("payment").style.display="flex";
}

function closePay(){
document.getElementById("payment").style.display="none";
}

</script>

</body>
</html>
