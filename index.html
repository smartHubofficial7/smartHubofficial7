<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartHub Electronics</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#0a0a0a;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:30px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#0a8f00;
font-size:20px;
font-weight:bold;
}

button{
background:#ff6600;
border:none;
padding:10px 18px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#e55300;
}

#payment{
display:none;
text-align:center;
padding:40px;
}

#qr{
display:none;
text-align:center;
padding:40px;
}

.qrimg{
width:260px;
margin-top:20px;
}

</style>
</head>


<body>

<header>
SmartHub Electronics Store
</header>


<div class="products">

<div class="card">
<img src="https://cdn.pixabay.com/photo/2018/01/27/17/19/smartwatch-3111598_1280.jpg">
<h3>Smart Watch</h3>
<p class="price">₹1999</p>
<button onclick="buy()">Buy Now</button>
</div>


<div class="card">
<img src="https://cdn.pixabay.com/photo/2016/11/29/09/32/fan-1869716_1280.jpg">
<h3>Fan</h3>
<p class="price">₹1499</p>
<button onclick="buy()">Buy Now</button>
</div>


<div class="card">
<img src="https://cdn.pixabay.com/photo/2016/03/27/21/16/refrigerator-1284504_1280.jpg">
<h3>Refrigerator</h3>
<p class="price">₹15999</p>
<button onclick="buy()">Buy Now</button>
</div>

</div>



<div id="payment">

<h2>Select Payment Method</h2>

<br>

<button onclick="showQR()">Pay With UPI</button>

</div>



<div id="qr">

<h2>Scan QR Code to Pay</h2>

<img src="QRCODE.jpeg" class="qrimg">

<p>After payment send screenshot for confirmation.</p>

</div>



<script>

function buy(){

document.querySelector(".products").style.display="none"

document.getElementById("payment").style.display="block"

}

function showQR(){

document.getElementById("payment").style.display="none"

document.getElementById("qr").style.display="block"

}

</script>


</body>
</html>
