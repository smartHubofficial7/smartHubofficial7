<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>SmartHub Store</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">
<img src="SMARTHUB-logo.png">
<h1>SmartHub</h1>
</div>

<input class="search" placeholder="Search Products">

<div class="top-buttons">
<button onclick="history.back()">Back</button>
<button onclick="openCart()">Cart</button>
</div>

</header>


<div class="container">

<div class="card">
<img src="https://m.media-amazon.com/images/I/61y2VVWcGBL.jpg">
<h3>Smart Watch</h3>
<div class="price">₹1999</div>
<button class="btn cartbtn" onclick="addCart('Smart Watch')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/81Zt42ioCgL.jpg">
<h3>LED TV</h3>
<div class="price">₹29999</div>
<button class="btn cartbtn" onclick="addCart('LED TV')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71Wv8G9F0AL.jpg">
<h3>Refrigerator</h3>
<div class="price">₹18999</div>
<button class="btn cartbtn" onclick="addCart('Refrigerator')">Add To Cart</button>
<button class="btn buybtn" onclick="buy()">Buy Now</button>
</div>

</div>


<div id="cartPanel">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<button onclick="buy()">Checkout</button>

</div>


<div id="paymentBox">

<h2>UPI Payment</h2>

<p>Scan QR to Pay</p>

<img src="qrcode.png">

<br><br>

<button onclick="closePay()">Close</button>

</div>


<div id="notify"></div>


<script src="script.js"></script>

</body>
</html>
