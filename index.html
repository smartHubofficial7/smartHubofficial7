<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART HUB</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
<img src="SMARTHUB-logo.png">
<h2>SMART HUB</h2>
</div>

<nav>
<button onclick="openLogin()">Login</button>
<button onclick="openCart()">Cart 🛒</button>
</nav>

</header>


<!-- LOGIN PAGE -->

<div id="loginBox" class="loginBox">

<h2>User Login</h2>

<input id="username" placeholder="Enter Username">
<input id="password" type="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p onclick="signup()">Create Account</p>

</div>


<!-- CART -->

<div id="cart" class="cart">

<h2>Your Cart</h2>
<ul id="cartItems"></ul>

<button onclick="checkout()">BUY NOW</button>

</div>


<!-- NOTIFICATION -->

<div id="notification" class="notification">
Product added to cart
</div>



<!-- PRODUCTS -->

<section class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">

<h3>Smart Watch</h3>

<p>$50</p>

<button onclick="addCart('Smart Watch')">Add Cart</button>
<button onclick="buy()">Buy Now</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9">

<h3>Wireless Headphone</h3>

<p>$80</p>

<button onclick="addCart('Headphone')">Add Cart</button>
<button onclick="buy()">Buy Now</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<h3>Smart Phone</h3>

<p>$500</p>

<button onclick="addCart('Smart Phone')">Add Cart</button>
<button onclick="buy()">Buy Now</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">

<h3>Laptop</h3>

<p>$900</p>

<button onclick="addCart('Laptop')">Add Cart</button>
<button onclick="buy()">Buy Now</button>

</div>

</section>


<!-- PAYMENT -->

<section class="payment">

<h2>Scan To Pay</h2>

<img src="qrcode.png">

</section>


<script src="script.js"></script>

</body>
</html>
