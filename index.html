<!DOCTYPE html>

<html>
<head>

<title>SmartHub Electronics</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

.header{
background:#d32f2f;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:24px;
font-weight:bold;
}

.search{
width:40%;
padding:8px;
border-radius:20px;
border:none;
}

.cart{
font-size:18px;
}

/* BANNER */

.banner img{
width:100%;
height:350px;
object-fit:cover;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
padding:30px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.price{
color:#2e7d32;
font-size:20px;
font-weight:bold;
}

button{
background:#ff6a00;
border:none;
color:white;
padding:10px 18px;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

/* PAYMENT */

#payment{
display:none;
text-align:center;
padding:40px;
}

#qr{
display:none;
text-align:center;
padding:40px;
}

.qrimg{
width:260px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">SmartHub Electronics</div>

<input class="search" placeholder="Search electronics...">

<div class="cart">🛒 Cart</div>

</div>

<div class="banner">

<img src="https://images.unsplash.com/photo-1498049794561-7780e7231661">

</div>

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">

<h3>Smart Watch</h3>

<p class="price">₹1999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">

<h3>Refrigerator</h3>

<p class="price">₹15999</p>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1598514982901-4d1b4e1d1e70">

<h3>Ceiling Fan</h3>

<p class="price">₹1499</p>

<button onclick="buy()">Buy Now</button>

</div>

</div>

<div id="payment">

<h2>Select Payment Method</h2>

<br>

<button onclick="showQR()">Pay with UPI</button>

</div>

<div id="qr">

<h2>Scan QR Code to Pay</h2>

<br>

<img src="qrcode.png" class="qrimg">

<p>Scan with PhonePe / GPay / Paytm</p>

</div>

<footer>

© 2026 SmartHub Electronics

</footer>

<script>

function buy(){

document.querySelector(".products").style.display="none"
document.querySelector(".banner").style.display="none"

document.getElementById("payment").style.display="block"

}

function showQR(){

document.getElementById("payment").style.display="none"

document.getElementById("qr").style.display="block"

}

</script>

</body>
</html>
