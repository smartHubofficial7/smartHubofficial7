<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechHub</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
transition:0.3s;
}

/* BODY */

body{
background:linear-gradient(120deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

/* LIGHT MODE */

.light{
background:#f1f5f9;
color:black;
}

.light header{
background:#e2e8f0;
}

/* HEADER */

header{
background:#020617;
padding:15px 25px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* LEFT SIDE */

.left{
display:flex;
align-items:center;
gap:20px;
}

/* CART ICON */

.cart-icon{
font-size:22px;
cursor:pointer;
}

/* LOGO */

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
}

/* NAV */

nav button{
background:none;
border:none;
color:white;
margin-left:15px;
font-size:15px;
cursor:pointer;
}

nav button:hover{
color:#38bdf8;
}

/* CONTAINER */

.container{
padding:40px;
}

/* PAGES */

.page{
display:none;
}

.active{
display:block;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:55px;
}

.hero p{
color:#94a3b8;
margin-top:20px;
}

/* BUTTON */

.btn{
background:#38bdf8;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

.btn:hover{
background:#0ea5e9;
}

/* CART ITEMS */

.cart-item{
background:#020617;
padding:15px;
margin:10px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
}

/* WISHLIST */

#wishlistItems p{
background:#020617;
padding:10px;
margin:8px 0;
border-radius:6px;
}

/* QR */

.qr{
text-align:center;
margin-top:30px;
}

.qr img{
width:200px;
}

/* FOOTER */

footer{
margin-top:80px;
background:#020617;
padding:30px;
text-align:center;
}

</style>

</head>

<body>


<header>

<div class="left">

<div class="cart-icon" onclick="showPage('cart')">🛒</div>

<div class="logo">TechHub</div>

</div>

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('wishlist')">Wishlist</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="toggleTheme()">Theme</button>

</nav>

</header>


<div class="container">


<!-- HOME -->

<div id="home" class="page active">

<div class="hero">

<h1>Welcome To TechHub</h1>

<p>Your Simple Tech Store</p>

<button class="btn" onclick="addSample()">Add Sample Item</button>

</div>

</div>


<!-- CART -->

<div id="cart" class="page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button class="btn" onclick="goCheckout()">Checkout</button>

</div>


<!-- WISHLIST -->

<div id="wishlist" class="page">

<h2>Wishlist</h2>

<div id="wishlistItems"></div>

</div>


<!-- CHECKOUT -->

<div id="checkout" class="page">

<h2>Checkout</h2>

<div class="qr">

<img src="qrcode.png">

</div>

<button class="btn" onclick="placeOrder()">Payment Done</button>

</div>


<!-- ORDERS -->

<div id="orders" class="page">

<h2>Your Orders</h2>

<div id="orderList"></div>

</div>


</div>


<footer>

<p>© 2026 TechHub Store</p>

</footer>


<script>

/* DATA */

let cart=[]
let wishlist=[]
let orders=[]


/* PAGE SWITCH */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}


/* SAMPLE ITEM */

function addSample(){

addToCart("Sample Headphone",199)

addWishlist("Sample Headphone",199)

alert("Sample item added")

}


/* ADD TO CART */

function addToCart(name,price){

let item=cart.find(p=>p.name===name)

if(item) item.qty++
else cart.push({name,price,qty:1})

updateCart()

}


/* UPDATE CART */

function updateCart(){

let div=document.getElementById("cartItems")

div.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price*item.qty

div.innerHTML+=`

<div class="cart-item">

${item.name} $${item.price} × ${item.qty}

<div>

<button onclick="increase(${i})">+</button>

<button onclick="decrease(${i})">-</button>

<button onclick="removeItem(${i})">Remove</button>

</div>

</div>

`

})

document.getElementById("total").innerText="Total $"+total

}


/* CART CONTROLS */

function increase(i){

cart[i].qty++

updateCart()

}

function decrease(i){

cart[i].qty--

if(cart[i].qty<=0) cart.splice(i,1)

updateCart()

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}


/* WISHLIST */

function addWishlist(name,price){

wishlist.push({name,price})

updateWishlist()

}

function updateWishlist(){

let div=document.getElementById("wishlistItems")

div.innerHTML=""

wishlist.forEach(item=>{

div.innerHTML+=`<p>${item.name} - $${item.price}</p>`

})

}


/* CHECKOUT */

function goCheckout(){

if(cart.length==0){

alert("Cart Empty")

return

}

showPage("checkout")

}


/* PLACE ORDER */

function placeOrder(){

orders.push([...cart])

cart=[]

updateCart()

updateOrders()

alert("Order Placed")

showPage("orders")

}


/* ORDER LIST */

function updateOrders(){

let div=document.getElementById("orderList")

div.innerHTML=""

orders.forEach((o,i)=>{

div.innerHTML+=`<p>Order ${i+1} - ${o.length} items</p>`

})

}


/* THEME */

function toggleTheme(){

document.body.classList.toggle("light")

}

</script>

</body>
</html>
