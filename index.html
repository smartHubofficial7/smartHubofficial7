<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartHub Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f7;
}

/* HEADER */

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
color:#00c3ff;
}

/* CATEGORY */

.categories{
text-align:center;
background:white;
padding:10px;
}

.categories button{
padding:8px 12px;
margin:5px;
border:none;
background:#eee;
cursor:pointer;
border-radius:4px;
}

.categories button:hover{
background:#ddd;
}

/* PRODUCTS */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:red;
font-weight:bold;
}

button{
padding:7px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin:4px;
}

.add{
background:orange;
color:white;
}

.buy{
background:#28a745;
color:white;
}

/* PAYMENT */

#payment{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.paybox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

.paybox img{
width:200px;
}

</style>
</head>

<body>

<header>

<div class="logo">SmartHub</div>

</header>

<div class="categories">

<button onclick="filter('all')">All</button>
<button onclick="filter('phone')">Phones</button>
<button onclick="filter('laptop')">Laptop</button>
<button onclick="filter('gaming')">Gaming</button>
<button onclick="filter('home')">Home</button>

</div>

<div class="container">

<!-- S23 ULTRA -->

<div class="card phone">

<img src="https://images.samsung.com/is/image/samsung/p6pim/in/sm-s918bzkdins/gallery/in-galaxy-s23-s918-sm-s918bzkdins-thumb-534863403">

<h3>Samsung S23 Ultra</h3>

<div class="price">₹79999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- IPHONE -->

<div class="card phone">

<img src="https://m.media-amazon.com/images/I/61bK6PMOC3L.jpg">

<h3>iPhone</h3>

<div class="price">₹89999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- OFFICE LAPTOP -->

<div class="card laptop">

<img src="https://m.media-amazon.com/images/I/71TPda7cwUL.jpg">

<h3>Office Laptop</h3>

<div class="price">₹35999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- GAMING LAPTOP -->

<div class="card gaming">

<img src="https://m.media-amazon.com/images/I/71an9eiBxpL.jpg">

<h3>Gaming Laptop</h3>

<div class="price">₹55999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- HEADPHONES -->

<div class="card">

<img src="https://m.media-amazon.com/images/I/61KNJav3S9L.jpg">

<h3>Headphones</h3>

<div class="price">₹2499</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- WATCH -->

<div class="card">

<img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL.jpg">

<h3>Smart Watch</h3>

<div class="price">₹1999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- EARBUDS -->

<div class="card">

<img src="https://m.media-amazon.com/images/I/61SUj2aKoEL.jpg">

<h3>Bluetooth Earbuds</h3>

<div class="price">₹1499</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- WASHING MACHINE -->

<div class="card home">

<img src="https://m.media-amazon.com/images/I/71Jv2jVh6nL.jpg">

<h3>Washing Machine</h3>

<div class="price">₹15999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- AC -->

<div class="card home">

<img src="https://m.media-amazon.com/images/I/51R5N4CqZXL.jpg">

<h3>Air Conditioner</h3>

<div class="price">₹32999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- LED TV -->

<div class="card home">

<img src="https://m.media-amazon.com/images/I/81fxjeu8fdL.jpg">

<h3>LED TV</h3>

<div class="price">₹29999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

<!-- REFRIGERATOR -->

<div class="card home">

<img src="https://m.media-amazon.com/images/I/71WvVq1W1VL.jpg">

<h3>Refrigerator</h3>

<div class="price">₹18999</div>

<button class="add">Add Cart</button>
<button class="buy" onclick="pay()">Buy</button>

</div>

</div>

<!-- PAYMENT QR -->

<div id="payment">

<div class="paybox">

<h2>Scan QR to Pay</h2>

<img src="qrcode.png">

<br><br>

<button onclick="closePay()">Close</button>

</div>

</div>

<script>

function pay(){

document.getElementById("payment").style.display="flex"

}

function closePay(){

document.getElementById("payment").style.display="none"

}

function filter(type){

document.querySelectorAll(".card").forEach(card=>{

card.style.display=(type=="all"||card.classList.contains(type))?"block":"none"

})

}

</script>

</body>
</html>
