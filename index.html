<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartHub Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f4f8;
}

/* HEADER */

header{
background:#0b1a2d;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
}

.logoBox img{
width:35px;
}

.logoBox h1{
font-size:22px;
}

.search{
width:40%;
padding:10px;
border:none;
border-radius:6px;
font-size:14px;
}

.top-buttons button{
margin-left:10px;
padding:9px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.loginbtn{
background:#4caf50;
color:white;
}

.cartbtn{
background:#ff9800;
color:white;
}

.top-buttons button:hover{
transform:scale(1.05);
}

/* CART COUNT */

.cartCount{
background:red;
color:white;
padding:3px 7px;
border-radius:50%;
font-size:12px;
margin-left:5px;
}

/* PRODUCTS */

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:#e53935;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

/* BUTTONS */

.btn{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
font-size:13px;
}

.add{
background:#ff9800;
color:white;
}

.buy{
background:#4caf50;
color:white;
}

/* CART PANEL */

#cartPanel{
position:fixed;
top:0;
right:-380px;
width:360px;
height:100%;
background:white;
box-shadow:-4px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
z-index:999;
}

#cartPanel h2{
margin-bottom:15px;
}

.cartItem{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.closeCart{
background:red;
color:white;
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-bottom:10px;
}

/* PAYMENT */

#paymentBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
text-align:center;
z-index:999;
}

#paymentBox img{
width:220px;
margin:10px 0;
}

/* LOGIN */

#loginBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
text-align:center;
z-index:999;
}

input{
padding:10px;
margin:6px;
width:90%;
border:1px solid #ddd;
border-radius:6px;
}

/* NOTIFY */

#notify{
position:fixed;
bottom:20px;
right:20px;
background:#4caf50;
color:white;
padding:12px 20px;
border-radius:6px;
display:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<header>

<div class="logoBox">

<img src="SMARTHUB-logo.png">

<h1>SmartHub</h1>

</div>

<input class="search" placeholder="Search Products" onkeyup="searchProducts()">

<div class="top-buttons">

<button class="loginbtn" onclick="openLogin()">Login</button>

<button class="cartbtn" onclick="openCart()">
Cart <span class="cartCount" id="cartCount">0</span>
</button>

</div>

</header>


<div class="container" id="productContainer">

</div>


<!-- CART PANEL -->

<div id="cartPanel">

<button class="closeCart" onclick="closeCart()">Close</button>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<br>

<button class="buy btn" onclick="buy()">Checkout</button>

</div>


<!-- PAYMENT -->

<div id="paymentBox">

<h2>UPI Payment</h2>

<p>Scan QR to Pay</p>

<img src="qrcode.png">

<br>

<button class="btn" onclick="closePay()">Close</button>

</div>


<!-- LOGIN -->

<div id="loginBox">

<h2>User Login</h2>

<input placeholder="Email">

<input placeholder="Password">

<br>

<button class="btn buy" onclick="closeLogin()">Login</button>

</div>


<div id="notify"></div>


<script>

let products=[

{ name:"Smart Watch", price:1999, img:"https://m.media-amazon.com/images/I/61ZjlBOp+rL._AC_UF1000,1000_QL80_.jpg" },

{ name:"Refrigerator", price:18999, img:"https://m.media-amazon.com/images/I/71YXzeOuslL.jpg" },

{ name:"Ceiling Fan", price:2499, img:"https://m.media-amazon.com/images/I/61p0G+6YdPL.jpg" },

{ name:"Bluetooth Earbuds", price:1499, img:"https://m.media-amazon.com/images/I/61SUj2aKoEL.jpg" },

{ name:"Gaming Laptop", price:55999, img:"https://m.media-amazon.com/images/I/71TPda7cwUL.jpg" },

{ name:"LED TV", price:29999, img:"https://m.media-amazon.com/images/I/61-r9zOKBCL.jpg" }

]

let cart=[]

function loadProducts(){

let box=document.getElementById("productContainer")

box.innerHTML=""

products.forEach((p,i)=>{

box.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button class="btn add" onclick="addCart(${i})">Add To Cart</button>

<button class="btn buy" onclick="buy()">Buy Now</button>

</div>

`

})

}

loadProducts()

function addCart(i){

cart.push(products[i])

updateCart()

showNotify(products[i].name+" added to cart")

}

function updateCart(){

let cartBox=document.getElementById("cartItems")

cartBox.innerHTML=""

cart.forEach(item=>{

cartBox.innerHTML+=`

<div class="cartItem">

<span>${item.name}</span>

<span>₹${item.price}</span>

</div>

`

})

document.getElementById("cartCount").innerText=cart.length

}

function openCart(){

document.getElementById("cartPanel").style.right="0"

}

function closeCart(){

document.getElementById("cartPanel").style.right="-380px"

}

function buy(){

document.getElementById("paymentBox").style.display="block"

}

function closePay(){

document.getElementById("paymentBox").style.display="none"

}

function openLogin(){

document.getElementById("loginBox").style.display="block"

}

function closeLogin(){

document.getElementById("loginBox").style.display="none"

}

function showNotify(text){

let n=document.getElementById("notify")

n.innerText=text

n.style.display="block"

setTimeout(()=>{

n.style.display="none"

},2000)

}

/* SEARCH */

function searchProducts(){

let value=document.querySelector(".search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.querySelector("h3").innerText.toLowerCase()

card.style.display=name.includes(value)?"block":"none"

})

}

</script>

</body>
</html>
