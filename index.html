<!DOCTYPE html>
<html>
<head>
<title>SmartHub Electronics</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#e4002b;
color:white;
padding:15px;
font-size:24px;
font-weight:bold;
}

.search{
width:50%;
padding:10px;
margin-left:20px;
border-radius:5px;
border:none;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:red;
font-size:20px;
font-weight:bold;
}

.btn{
background:#ff9800;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

#payment{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.paybox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

.qr{
width:250px;
}

</style>
</head>

<body>

<header>
SmartHub Electronics
<input class="search" placeholder="Search Products">
</header>

<div class="container">

<div class="card">
<img src="https://m.media-amazon.com/images/I/61IMRs+o0iL._AC_SL1500_.jpg">
<h3>Smart Watch</h3>
<p class="price">₹1999</p>
<button class="btn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71v9Lnb8PXL._AC_SL1500_.jpg">
<h3>Refrigerator</h3>
<p class="price">₹18999</p>
<button class="btn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61S8qkzG2BL._AC_SL1500_.jpg">
<h3>Ceiling Fan</h3>
<p class="price">₹2499</p>
<button class="btn" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61KNJav3S9L._AC_SL1500_.jpg">
<h3>Bluetooth Earbuds</h3>
<p class="price">₹1499</p>
<button class="btn" onclick="buy()">Buy Now</button>
</div>

</div>

<div id="payment">

<div class="paybox">

<h2>UPI Payment</h2>

<p>Scan QR Code</p>

<img src="qrcode.png" class="qr">

<br><br>

<button onclick="closePay()">Close</button>

</div>

</div>

<script>

function buy(){
document.getElementById("payment").style.display="flex"
}

function closePay(){
document.getElementById("payment").style.display="none"
}

</script>

</body>
</html>
