<!DOCTYPE html>
<html>
<head>

<title>SMART HUB Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

<img src="SMARTHUB-logo.png">

<h2>SMART HUB</h2>

</div>

<input type="text" placeholder="Search products..." class="search">

<div class="menu">

<button onclick="openLogin()">Login</button>

<button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>

</div>

</header>

<section class="hero">

<h1>Welcome To SMART HUB</h1>

<p>Best Online Electronics Store</p>

</section>

<section class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1518441902110-9c0b54e7c3c1">

<h3>Wireless Headphone</h3>

<p>$49</p>

<button onclick="addCart()">Add To Cart</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<h3>Smart Watch</h3>

<p>$89</p>

<button onclick="addCart()">Add To Cart</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">

<h3>Gaming Mouse</h3>

<p>$39</p>

<button onclick="addCart()">Add To Cart</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9">

<h3>Bluetooth Speaker</h3>

<p>$59</p>

<button onclick="addCart()">Add To Cart</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">

<h3>Mechanical Keyboard</h3>

<p>$99</p>

<button onclick="addCart()">Add To Cart</button>

</div>

</section>

<div id="toast">Product Added To Cart</div>

<script src="script.js"></script>

</body>
</html>
