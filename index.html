<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartHub Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>SmartHub</h1>

<input id="search" class="search" placeholder="Search Products" onkeyup="searchProduct()">

<div class="top-buttons">
<button onclick="openLogin()">Login</button>
<button onclick="openCart()">Cart</button>
</div>

</header>

<div class="container" id="productContainer">

</div>


<div id="cartPanel">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<h3>Total : ₹<span id="total">0</span></h3>

<button onclick="buy()">Checkout</button>

</div>


<div id="paymentBox">

<h2>UPI Payment</h2>

<p>Scan QR to Pay</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=UPI-PAYMENT">

<br><br>

<button onclick="closePay()">Close</button>

</div>


<div id="loginBox">

<h2>User Login</h2>

<input placeholder="Email">
<input placeholder="Password">

<br>

<button onclick="closeLogin()">Login</button>

</div>


<div id="notify"></div>

<script src="script.js"></script>

</body>
</html>
