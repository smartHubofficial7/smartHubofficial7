<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechHub</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
transition:0.3s;
}

/* BODY */

body{
background:linear-gradient(120deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

/* LIGHT MODE */

.light{
background:#f1f5f9;
color:black;
}

.light header{
background:#e2e8f0;
}

/* HEADER */

header{
background:#020617;
padding:15px 25px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

/* LEFT */

.left{
display:flex;
align-items:center;
gap:20px;
}

.cart-icon{
font-size:22px;
cursor:pointer;
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
}

/* NAV */

nav button{
background:none;
border:none;
color:white;
margin-left:15px;
font-size:15px;
cursor:pointer;
}

nav button:hover{
color:#38bdf8;
}

/* SEARCH */

.search{
padding:8px;
border:none;
border-radius:5px;
}

/* CONTAINER */

.container{
padding:40px;
}

/* PAGE */

.page{
display:none;
}

.active{
display:block;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:55px;
}

.hero p{
color:#94a3b8;
margin-top:20px;
}

/* BUTTON */

.btn{
background:#38bdf8;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.btn:hover{
background:#0ea5e9;
}

/* PRODUCTS GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-top:30px;
}

/* CARD */

.card{
background:#020617;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#38bdf8;
margin:8px 0;
}

/* CART */

.cart-item{
background:#020617;
padding:15px;
margin:10px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
}

/* QR */

.qr{
text-align:center;
margin-top:30px;
}

.qr img{
width:200px;
}

/* FOOTER */

footer{
margin-top:80px;
background:#020617;
padding:30px;
text-align:center;
}

</style>

</head>

<body>


<header>

<div class="left">

<div class="cart-icon" onclick="showPage('cart')">🛒</div>

<div class="logo">TechHub</div>

</div>

<div>

<input class="search" placeholder="Search product..." onkeyup="searchProduct(this.value)">

</div>

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('wishlist')">Wishlist</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="toggleTheme()">Theme</button>

</nav>

</header>


<div class="container">

<!-- HOME -->

<div id="home" class="page active">

<div class="hero">

<h1>Welcome To TechHub</h1>

<p>Your Tech Store</p>

<button class="btn" onclick="showPage('shop')">Shop Now</button>

</div>

</div>


<!-- SHOP -->

<div id="shop" class="page">

<h2>Products</h2>

<div id="productGrid" class="grid"></div>

</div>


<!-- CART -->

<div id="cart" class="page">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button class="btn" onclick="goCheckout()">Checkout</button>

</div>


<!-- WISHLIST -->

<div id="wishlist" class="page">

<h2>Wishlist</h2>

<div id="wishlistItems"></div>

</div>


<!-- CHECKOUT -->

<div id="checkout" class="page">

<h2>Checkout</h2>

<div class="qr">

<img src="qrcode.png">

</div>

<button class="btn" onclick="placeOrder()">Payment Done</button>

</div>


<!-- ORDERS -->

<div id="orders" class="page">

<h2>Your Orders</h2>

<div id="orderList"></div>

</div>

</div>


<footer>

<p>© 2026 TechHub Store</p>

</footer>


<script>

/* PRODUCTS */

let products=[

{name:"iPhone 15",price:999,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"MacBook Pro",price:1999,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Gaming Laptop",price:1499,img:"https://images.unsplash.com/photo-1606813909023-0f2e29e7c8e6"},
{name:"Smart Watch",price:299,img:"https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"},
{name:"Headphones",price:199,img:"https://images.unsplash.com/photo-1580894908361-967195033215"},
{name:"Gaming Mouse",price:79,img:"https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf"},
{name:"Mechanical Keyboard",price:129,img:"https://images.unsplash.com/photo-1593640408182-31c70c8268f5"},
{name:"Monitor",price:399,img:"https://images.unsplash.com/photo-1587829741301-dc798b83add3"}

]

let cart=[]
let wishlist=[]
let orders=[]


/* PAGE */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}


/* LOAD PRODUCTS */

function loadProducts(list=products){

let grid=document.getElementById("productGrid")

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<button class="btn" onclick="addToCart('${p.name}',${p.price})">Add Cart</button>

<button class="btn" onclick="addWishlist('${p.name}',${p.price})">Wishlist</button>

</div>

`

})

}

loadProducts()


/* SEARCH */

function searchProduct(text){

let filtered=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()))

loadProducts(filtered)

}


/* CART */

function addToCart(name,price){

let item=cart.find(p=>p.name===name)

if(item) item.qty++
else cart.push({name,price,qty:1})

updateCart()

}


/* UPDATE CART */

function updateCart(){

let div=document.getElementById("cartItems")

div.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price*item.qty

div.innerHTML+=`

<div class="cart-item">

${item.name} $${item.price} × ${item.qty}

<div>

<button onclick="increase(${i})">+</button>

<button onclick="decrease(${i})">-</button>

<button onclick="removeItem(${i})">Remove</button>

</div>

</div>

`

})

document.getElementById("total").innerText="Total $"+total

}


/* CART BUTTONS */

function increase(i){

cart[i].qty++

updateCart()

}

function decrease(i){

cart[i].qty--

if(cart[i].qty<=0) cart.splice(i,1)

updateCart()

}

function removeItem(i){

cart.splice(i,1)

updateCart()

}


/* WISHLIST */

function addWishlist(name,price){

wishlist.push({name,price})

updateWishlist()

}

function updateWishlist(){

let div=document.getElementById("wishlistItems")

div.innerHTML=""

wishlist.forEach(item=>{

div.innerHTML+=`<p>${item.name} - $${item.price}</p>`

})

}


/* CHECKOUT */

function goCheckout(){

if(cart.length==0){

alert("Cart Empty")

return

}

showPage("checkout")

}


/* ORDER */

function placeOrder(){

orders.push([...cart])

cart=[]

updateCart()

updateOrders()

alert("Order Placed")

showPage("orders")

}


/* ORDERS */

function updateOrders(){

let div=document.getElementById("orderList")

div.innerHTML=""

orders.forEach((o,i)=>{

div.innerHTML+=`<p>Order ${i+1} - ${o.length} items</p>`

})

}


/* THEME */

function toggleTheme(){

document.body.classList.toggle("light")

}

</script>

</body>
</html>
