<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZone Pro Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#38bdf8;
--bg-dark:#0f172a;
--bg-card:#1e293b;
--border:#334155;
--text:#f8fafc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:var(--bg-dark);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
border-bottom:1px solid var(--border);
}

.logo{
font-size:24px;
font-weight:800;
color:var(--primary);
}

.cart{
background:var(--bg-card);
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.cart span{
color:var(--primary);
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero p{
color:#94a3b8;
}

/* PRODUCTS */

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:var(--bg-card);
border-radius:12px;
overflow:hidden;
border:1px solid var(--border);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:20px;
}

.card h3{
margin-bottom:10px;
}

.price{
color:var(--primary);
font-size:20px;
margin-bottom:10px;
display:block;
}

button{
background:var(--primary);
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

button:hover{
opacity:.8;
}

/* CART MODAL */

.cart-modal{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:#020617;
padding:20px;
transition:.4s;
overflow:auto;
}

.cart-modal.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:15px;
border-bottom:1px solid var(--border);
padding-bottom:10px;
}

.total{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div class="logo">TechZone</div>
<div class="cart" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</div>
</header>

<section class="hero">
<h1>TechZone Pro Store</h1>
<p>Best Gaming & Tech Accessories</p>
</section>

<div class="container">

<div class="grid" id="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7">
<div class="card-body">
<h3>Gaming Mouse</h3>
<span class="price">$29</span>
<button onclick="addToCart('Gaming Mouse',29)">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div class="card-body">
<h3>Laptop</h3>
<span class="price">$899</span>
<button onclick="addToCart('Laptop',899)">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580894908361-967195033215">
<div class="card-body">
<h3>Gaming Keyboard</h3>
<span class="price">$79</span>
<button onclick="addToCart('Keyboard',79)">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9">
<div class="card-body">
<h3>Headphones</h3>
<span class="price">$59</span>
<button onclick="addToCart('Headphones',59)">Add to Cart</button>
</div>
</div>

</div>

</div>

<div class="cart-modal" id="cart">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

</div>

<script>

let cart=[]
let total=0

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}

function addToCart(name,price){

cart.push({name,price})
total+=price

document.getElementById("cart-count").innerText=cart.length

renderCart()

}

function renderCart(){

let cartItems=document.getElementById("cart-items")

cartItems.innerHTML=""

cart.forEach(item=>{

cartItems.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>$${item.price}</span>
</div>
`

})

document.getElementById("total").innerText=total

}

</script>

</body>
</html>
