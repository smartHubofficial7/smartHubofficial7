<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SMART HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<header>

<div class="logo">

<img src="SMARTHUB-logo.png">
<h1>SMART HUB</h1>

</div>

<input class="search" placeholder="Search Products">

<div class="top-buttons">

<button onclick="openLogin()">Login</button>

<button onclick="openCart()">
Cart (<span id="cartCount">0</span>)
</button>

</div>

</header>


<section class="hero">

<h2>Welcome To SMART HUB</h2>
<p>Best Online Electronics Store</p>

</section>


<div class="container">

<div class="card">

<img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL.jpg">

<h3>Smart Watch</h3>

<div class="price">₹1999</div>

<button onclick="addCart('Smart Watch')" class="btn cartbtn">Add To Cart</button>

<button onclick="buy()" class="btn buybtn">Buy Now</button>

</div>


<div class="card">

<img src="https://m.media-amazon.com/images/I/71TPda7cwUL.jpg">

<h3>Gaming Laptop</h3>

<div class="price">₹55999</div>

<button onclick="addCart('Laptop')" class="btn cartbtn">Add To Cart</button>

<button onclick="buy()" class="btn buybtn">Buy Now</button>

</div>


<div class="card">

<img src="https://m.media-amazon.com/images/I/61SUj2aKoEL.jpg">

<h3>Bluetooth Earbuds</h3>

<div class="price">₹1499</div>

<button onclick="addCart('Earbuds')" class="btn cartbtn">Add To Cart</button>

<button onclick="buy()" class="btn buybtn">Buy Now</button>

</div>


<div class="card">

<img src="https://m.media-amazon.com/images/I/71YXzeOuslL.jpg">

<h3>Refrigerator</h3>

<div class="price">₹18999</div>

<button onclick="addCart('Fridge')" class="btn cartbtn">Add To Cart</button>

<button onclick="buy()" class="btn buybtn">Buy Now</button>

</div>

</div>


<div id="cartPanel">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<button onclick="buy()">Checkout</button>

</div>


<div id="paymentBox">

<h2>UPI Payment</h2>

<p>Scan QR to Pay</p>

<img src="qrcode.png">

<button onclick="closePay()">Close</button>

</div>


<div id="loginBox">

<h2>User Login</h2>

<input placeholder="Email">

<input placeholder="Password">

<button onclick="closeLogin()">Login</button>

</div>


<div id="notify"></div>

<script src="script.js"></script>

</body>

</html>
