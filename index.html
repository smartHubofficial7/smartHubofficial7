<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartHub Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f8;
}

/* HEADER */

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:24px;
font-weight:bold;
color:#00c3ff;
}

.search input{
padding:8px;
width:250px;
border-radius:4px;
border:none;
}

.cartbtn{
background:orange;
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* CATEGORY */

.categories{
background:white;
padding:10px;
text-align:center;
}

.categories button{
padding:8px 12px;
margin:5px;
border:none;
background:#eee;
cursor:pointer;
border-radius:4px;
}

.categories button:hover{
background:#ddd;
}

/* PRODUCTS */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.price{
color:red;
font-weight:bold;
}

button{
padding:7px 10px;
border:none;
cursor:pointer;
border-radius:4px;
margin:4px;
}

.add{
background:orange;
color:white;
}

.buy{
background:#28a745;
color:white;
}

/* CART PANEL */

#cartPanel{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.3);
padding:20px;
transition:.4s;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.remove{
background:red;
color:white;
}

</style>
</head>

<body>

<header>

<div class="logo">SmartHub</div>

<div class="search">
<input type="text" id="search" placeholder="Search product">
</div>

<button class="cartbtn" onclick="openCart()">Cart (<span id="count">0</span>)</button>

</header>

<div class="categories">

<button onclick="filter('all')">All</button>
<button onclick="filter('phone')">Phones</button>
<button onclick="filter('laptop')">Laptop</button>
<button onclick="filter('gaming')">Gaming</button>
<button onclick="filter('home')">Home</button>
<button onclick="filter('accessory')">Accessories</button>

</div>

<div class="container" id="products">

<!-- PHONE -->

<div class="card phone">
<img src="https://m.media-amazon.com/images/I/61-r9zOKBCL.jpg">
<h3>Smart Phone</h3>
<div class="price">₹7999</div>
<button class="add" onclick="addCart('Phone',7999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<div class="card phone">
<img src="https://m.media-amazon.com/images/I/61cwywLZR-L.jpg">
<h3>iPhone</h3>
<div class="price">₹79999</div>
<button class="add" onclick="addCart('iPhone',79999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<!-- LAPTOP -->

<div class="card laptop">
<img src="https://m.media-amazon.com/images/I/71TPda7cwUL.jpg">
<h3>Office Laptop</h3>
<div class="price">₹35999</div>
<button class="add" onclick="addCart('Laptop',35999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<!-- GAMING LAPTOP -->

<div class="card gaming">
<img src="https://m.media-amazon.com/images/I/71jG+e7roXL.jpg">
<h3>Gaming Laptop</h3>
<div class="price">₹55999</div>
<button class="add" onclick="addCart('Gaming Laptop',55999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<!-- ACCESSORIES -->

<div class="card accessory">
<img src="https://m.media-amazon.com/images/I/61KNJav3S9L.jpg">
<h3>Headphones</h3>
<div class="price">₹2499</div>
<button class="add" onclick="addCart('Headphones',2499)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<div class="card accessory">
<img src="https://m.media-amazon.com/images/I/61ZjlBOp+rL.jpg">
<h3>Smart Watch</h3>
<div class="price">₹1999</div>
<button class="add" onclick="addCart('Watch',1999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<div class="card accessory">
<img src="https://m.media-amazon.com/images/I/61SUj2aKoEL.jpg">
<h3>Bluetooth Earbuds</h3>
<div class="price">₹1499</div>
<button class="add" onclick="addCart('Earbuds',1499)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<!-- HOME APPLIANCES -->

<div class="card home">
<img src="https://m.media-amazon.com/images/I/71Jv2jVh6nL.jpg">
<h3>Washing Machine</h3>
<div class="price">₹15999</div>
<button class="add" onclick="addCart('Washing Machine',15999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<div class="card home">
<img src="https://m.media-amazon.com/images/I/51R5N4CqZXL.jpg">
<h3>Air Conditioner</h3>
<div class="price">₹32999</div>
<button class="add" onclick="addCart('AC',32999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<div class="card home">
<img src="https://m.media-amazon.com/images/I/81fxjeu8fdL.jpg">
<h3>LED TV</h3>
<div class="price">₹29999</div>
<button class="add" onclick="addCart('TV',29999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

<div class="card home">
<img src="https://m.media-amazon.com/images/I/71WvVq1W1VL.jpg">
<h3>Refrigerator</h3>
<div class="price">₹18999</div>
<button class="add" onclick="addCart('Fridge',18999)">Add Cart</button>
<button class="buy">Buy</button>
</div>

</div>

<!-- CART -->

<div id="cartPanel">

<h2>Your Cart</h2>

<button onclick="closeCart()">Close</button>

<div id="cartItems"></div>

<h3 id="total"></h3>

</div>

<script>

let cart=[]

function addCart(name,price){

cart.push({name,price})

renderCart()

}

function renderCart(){

let box=document.getElementById("cartItems")

let total=0

box.innerHTML=""

cart.forEach((item,i)=>{

total+=item.price

box.innerHTML+=`
<div class="cart-item">
${item.name} ₹${item.price}
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
`

})

document.getElementById("total").innerText="Total ₹"+total

document.getElementById("count").innerText=cart.length

}

function removeItem(i){

cart.splice(i,1)

renderCart()

}

function openCart(){

document.getElementById("cartPanel").style.right="0"

}

function closeCart(){

document.getElementById("cartPanel").style.right="-350px"

}

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let v=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(v)?"block":"none"

})

})

/* FILTER */

function filter(type){

document.querySelectorAll(".card").forEach(card=>{

card.style.display=(type=="all"||card.classList.contains(type))?"block":"none"

})

}

</script>

</body>
</html>
